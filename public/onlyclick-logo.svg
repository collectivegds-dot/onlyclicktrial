<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="400" height="400" rx="80" ry="80" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Inner highlight -->
  <rect x="20" y="20" width="360" height="180" rx="60" ry="60" fill="rgba(255,255,255,0.08)"/>
  <!-- OC Text -->
  <text
    x="200" y="230"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="160"
    fill="#0f172a"
    letter-spacing="-8"
  >OC</text>
  <!-- Tagline -->
  <text
    x="200" y="340"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="32"
    fill="rgba(15,23,42,0.6)"
    letter-spacing="6"
  >ONLYCLICK</text>
</svg>
