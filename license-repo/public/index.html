<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLYCLICK - License Portal</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: #0f1115; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: #161a22; border: 1px solid #2a3140; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; font-size: 24px; color: #4facfe; }
        p { color: #8c96a8; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 16px; background: #090b0e; border: 1px solid #2a3140; color: #fff; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #4facfe; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #2a3140; color: #555; cursor: not-allowed; }
        .result { margin-top: 24px; padding: 16px; background: #0f1822; border: 1px dashed #4facfe; border-radius: 8px; display: none; }
        .result.error { border-color: #ff4d4f; background: #2a0f15; color: #ff4d4f; }
        .key-text { font-family: monospace; font-size: 18px; color: #00f2fe; margin: 10px 0; user-select: all; cursor: pointer; }
        .copy-btn { margin-top: 10px; background: #2a3140; color: #fff; font-size: 12px; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Portal Lisensi</h1>
    <p>Masukkan email pembelian Anda untuk mendapatkan License Key ONLYCLICK.</p>

    <div id="form-section">
        <input type="email" id="email" placeholder="Contoh: agus@gmail.com" required />
        <button id="activate-btn" onclick="activate()">Dapatkan Lisensi</button>
    </div>

    <div id="result-box" class="result">
        <div id="result-message">Lisensi berhasil di-generate!</div>
        <div id="result-key" class="key-text" onclick="copyKey()"></div>
        <button class="copy-btn" onclick="copyKey()">Salin Key</button>
    </div>
</div>

<script>
    async function activate() {
        const email = document.getElementById('email').value.trim();
        if(!email) return alert('Masukkan email');
        
        const btn = document.getElementById('activate-btn');
        btn.innerText = 'Memproses...';
        btn.disabled = true;

        const resBox = document.getElementById('result-box');
        const resMsg = document.getElementById('result-message');
        const resKey = document.getElementById('result-key');

        try {
            const response = await fetch('/api/activate', {
                method: 'POST',
                headers:{ 'Content-Type':'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await response.json();

            resBox.style.display = 'block';
            resKey.innerText = '';
            
            if(data.success) {
                resBox.className = 'result';
                resMsg.innerText = 'Lisensi Anda siap! Gunakan key ini di aplikasi:';
                resKey.innerText = data.key;
            } else {
                resBox.className = 'result error';
                resMsg.innerText = data.reason || 'Terjadi kesalahan.';
            }
        } catch(e) {
            resBox.style.display = 'block';
            resBox.className = 'result error';
            resMsg.innerText = 'Gagal menghubungi server.';
        } finally {
            btn.innerText = 'Dapatkan Lisensi';
            btn.disabled = false;
        }
    }

    function copyKey() {
        const text = document.getElementById('result-key').innerText;
        if(text) {
            navigator.clipboard.writeText(text);
            alert('License Key disalin!');
        }
    }
</script>

</body>
</html>
