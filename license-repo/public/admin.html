<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLYCLICK - Admin Panel</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Inter', system-ui, sans-serif; background: #0f1115; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; background: #161a22; padding: 30px; border-radius: 12px; border: 1px solid #2a3140; }
        h1 { color: #4facfe; margin-top: 0; }
        h2 { font-size: 18px; border-bottom: 1px solid #2a3140; padding-bottom: 10px; margin-top: 30px; }
        input[type="password"], input[type="email"] { padding: 10px; background: #090b0e; border: 1px solid #2a3140; color: #fff; border-radius: 6px; }
        button { padding: 10px 16px; background: #4facfe; color: #000; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { opacity: 0.8; }
        
        .auth-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #2a3140; }
        .add-email-section { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-email-section input { flex: 1; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #2a3140; }
        th { color: #8c96a8; background: #090b0e; }
        tr:hover { background: #1c222d; }
        .status-active { color: #52c41a; }
        .status-inactive { color: #ff4d4f; }
        .btn-small { padding: 6px 10px; font-size: 12px; margin-right: 5px; }
        .btn-reset { background: #faad14; }
        .btn-revoke { background: #ff4d4f; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>License Admin Panel</h1>
    
    <div class="auth-section">
        <label>Admin Password:</label>
        <input type="password" id="admin-pass" placeholder="Enter admin password">
        <button onclick="loadData()">Login & Refresh Data</button>
    </div>

    <h2>1. Tambah Email Pembeli Baru</h2>
    <div class="add-email-section">
        <input type="email" id="new-email" placeholder="email_pembeli@gmail.com">
        <button onclick="addEmail()">Tambah Akses</button>
    </div>

    <h2>2. Data Lisensi</h2>
    <table>
        <thead>
            <tr>
                <th>Email</th>
                <th>License Key</th>
                <th>Device</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="5" style="text-align: center; color: #8c96a8;">Silakan login terlebih dahulu.</td></tr>
        </tbody>
    </table>
</div>

<script>
    async function callApi(action, payload = {}) {
        const pass = document.getElementById('admin-pass').value;
        if (!pass) return alert('Masukkan password admin!');
        
        try {
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ admin_password: pass, action, ...payload })
            });
            return await res.json();
        } catch(e) {
            alert('Gagal menghubungi server');
            return { success: false };
        }
    }

    async function loadData() {
        const res = await callApi('get_all');
        if (!res.success) return alert(res.reason || 'Login gagal.');

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        if (res.allowed.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Belum ada data.</td></tr>';
            return;
        }

        res.allowed.forEach(allwd => {
            const lic = res.licenses.find(l => l.email === allwd.email);
            
            const tr = document.createElement('tr');
            
            // Email
            const tdEmail = document.createElement('td');
            tdEmail.innerText = allwd.email;

            // License
            const tdLic = document.createElement('td');
            tdLic.innerText = lic ? lic.license_key : 'Belum di-generate';

            // Device
            const tdDev = document.createElement('td');
            tdDev.innerText = lic?.device_name ? `${lic.device_name} (${lic.device_fingerprint.substring(0,8)}...)` : '-';

            // Status
            const tdStatus = document.createElement('td');
            if (lic) {
                tdStatus.innerHTML = `<span class="${lic.status === 'active' ? 'status-active' : 'status-inactive'}">${lic.status.toUpperCase()}</span>`;
            } else {
                tdStatus.innerText = '-';
            }

            // Aksi
            const tdAction = document.createElement('td');
            if (lic) {
                tdAction.innerHTML = `
                    <button class="btn-small btn-reset" onclick="resetDevice('${lic.email}')">Reset Device</button>
                    ${lic.status === 'active' 
                        ? `<button class="btn-small btn-revoke" onclick="revoke('${lic.email}')">Nonaktifkan</button>`
                        : `<button class="btn-small btn-reset" onclick="reactivate('${lic.email}')">Aktifkan</button>`
                    }
                `;
            }

            tr.append(tdEmail, tdLic, tdDev, tdStatus, tdAction);
            tbody.appendChild(tr);
        });
    }

    async function addEmail() {
        const email = document.getElementById('new-email').value.trim();
        if(!email) return alert('Masukkan email valid');
        const res = await callApi('add_email', { email });
        if (res.success) {
            alert('Email berhasil ditambah! Pembeli kini bisa mendaftar di portal.');
            document.getElementById('new-email').value = '';
            loadData();
        } else alert(res.reason);
    }

    async function resetDevice(email) {
        if(!confirm('Yakin ingin mereset device untuk ' + email + '?')) return;
        const res = await callApi('reset_device', { email });
        if (res.success) loadData(); else alert(res.reason);
    }

    async function revoke(email) {
        if(!confirm('Yakin ingin menonaktifkan lisensi ' + email + '?')) return;
        const res = await callApi('revoke', { email });
        if (res.success) loadData(); else alert(res.reason);
    }

    async function reactivate(email) {
        if(!confirm('Yakin ingin mengaktifkan lisensi ' + email + '?')) return;
        const res = await callApi('re_activate', { email });
        if (res.success) loadData(); else alert(res.reason);
    }
</script>

</body>
</html>
